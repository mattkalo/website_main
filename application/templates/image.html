{% extends "layout.html" %}

{% block title %}
AI 圖片生成 | 蔡承恩
{% endblock %}

{% block content %}

<section class="page-section">
    <div class="container form-box">

        <h2 class="section-title">AI 圖片生成</h2>

        <div class="ai-card">

            <p class="portfolio-desc" style="margin-bottom: 20px;">
                此功能整合 OpenAI 圖片生成 API。輸入圖片描述後，系統會產生對應圖片，適合作為網站展示與作業成果截圖。
            </p>

            <form method="POST" action="{{ url_for('image') }}">
                <textarea
                    name="prompt"
                    rows="5"
                    placeholder="例如：A futuristic AI laboratory with blue neon light, COMSOL simulation screen, photonics research style"
                    required>{{ prompt }}</textarea>

                <select name="size">
                    <option value="1024x1024" {% if size == "1024x1024" %}selected{% endif %}>1024 x 1024</option>
                    <option value="1024x1536" {% if size == "1024x1536" %}selected{% endif %}>1024 x 1536</option>
                    <option value="1536x1024" {% if size == "1536x1024" %}selected{% endif %}>1536 x 1024</option>
                </select>

                <button type="submit" class="btn btn-primary">生成圖片</button>
            </form>

            {% if error_message %}
            <div class="error-box">
                {{ error_message }}
            </div>
            {% endif %}

            {% if image_url %}
            <div class="result-box">
                <h3>生成結果</h3>
                <img src="{{ image_url }}" alt="AI generated image" class="generated-img">
            </div>
            {% endif %}

        </div>

    </div>
</section>

{% endblock %}
