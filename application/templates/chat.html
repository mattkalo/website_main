{% extends "layout.html" %}

{% block title %}
AI 文字助理
{% endblock %}

{% block main %}

<div class="container description mb-5 pb-5" style="padding-top: 140px;">

    <div class="row justify-content-center">

        <div class="col-md-9">

            <div class="description-box">

                <h2 class="main-text">
                    AI <span class="name">文字助理</span>
                </h2>

                <p class="secondary-text">
                    這是整合 OpenAI 的個人化文字助理，可協助程式學習、Flask 部署、OpenAI API 使用與作業報告整理。
                </p>

                <form method="POST" action="{{ url_for('chat') }}">

                    <div class="mb-3">
                        <textarea class="form-control" name="message" rows="5"
                            placeholder="請輸入你的問題，例如：幫我整理 Flask 部署流程"
                            required>{{ user_message }}</textarea>
                    </div>

                    <button class="btn" type="submit">
                        送出問題 <i class="bx bx-send px-2"></i>
                    </button>

                </form>

                {% if ai_response %}
                <div class="card-design mt-4 p-4">

                    <h5>
                        <i class="bx bx-bot"></i>
                        AI 回覆
                    </h5>

                    <p style="white-space: pre-wrap;">{{ ai_response }}</p>

                </div>
                {% endif %}

            </div>

        </div>

    </div>

</div>

{% endblock %}
