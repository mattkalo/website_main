{% extends "layout.html" %}

{% block title %}
AI 文字助理 | 蔡承恩
{% endblock %}

{% block content %}

<section class="page-section">
    <div class="container form-box">

        <h2 class="section-title">AI 文字助理</h2>

        <div class="ai-card">

            <p class="portfolio-desc" style="margin-bottom: 20px;">
                此功能整合 OpenAI API，可協助整理 Flask 網站、OpenAI API、COMSOL、MATLAB、LineBot 與作業報告內容。
            </p>

            <form method="POST" action="{{ url_for('chat') }}">
                <textarea
                    name="message"
                    rows="6"
                    placeholder="請輸入問題，例如：幫我整理 Flask 整合 OpenAI 的作業說明"
                    required>{{ user_message }}</textarea>

                <button type="submit" class="btn btn-primary">送出問題</button>
            </form>

            {% if ai_response %}
            <div class="result-box">
                <h3>AI 回覆</h3>
                {{ ai_response }}
            </div>
            {% endif %}

        </div>

    </div>
</section>

{% endblock %}
